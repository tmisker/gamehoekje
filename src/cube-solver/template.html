<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121213">
  <title>Kubus Solver</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#121213; --panel:#1e1e20; --panel2:#2a2a2d; --line:#3a3a3c;
      --accent:#1faa47; --accentd:#178a3a; --text:#fff; --muted:#9a9a9d;
      --cs:min(58vw,230px);           /* cube size */
      --cu:calc(var(--cs)/3);         /* cubie size */
    }
    html,body{height:100%;}
    body{
      background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
      display:flex; flex-direction:column; align-items:center;
      min-height:100%; padding:14px 12px 32px; gap:12px;
    }
    header{text-align:center;}
    header h1{font-size:1.5rem;letter-spacing:1px;}
    header p{color:var(--muted);font-size:.78rem;margin-top:3px;}

    .card{
      width:100%; max-width:460px; background:var(--panel);
      border:1px solid var(--line); border-radius:14px; padding:12px;
    }

    /* ── 3D cube (27 cubies) ── */
    .scene{
      width:100%; max-width:460px; height:calc(var(--cs)*1.5);
      perspective:1300px; margin:2px auto 0;
      display:flex; align-items:center; justify-content:center;
    }
    .tilt{
      width:var(--cs); height:var(--cs);
      transform-style:preserve-3d;
      transform:rotateX(-22deg) rotateY(-30deg);
    }
    .cube{
      width:100%; height:100%; position:relative;
      transform-style:preserve-3d;
      transform:rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));
      transition:transform .45s cubic-bezier(.4,.05,.2,1);
    }
    .layer{                 /* temporary wrapper used to animate one layer turn */
      position:absolute; inset:0; transform-style:preserve-3d;
      transition:transform .45s ease-in-out;
    }
    .cubie{
      position:absolute; width:var(--cu); height:var(--cu);
      left:50%; top:50%; margin-left:calc(var(--cu)/-2); margin-top:calc(var(--cu)/-2);
      transform-style:preserve-3d;
    }
    .cf{                    /* one side of a cubie */
      position:absolute; width:var(--cu); height:var(--cu);
      background:#0a0a0b; border-radius:9px;
      backface-visibility:hidden;
    }
    .cf-U{transform:rotateX(90deg)  translateZ(calc(var(--cu)/2));}
    .cf-D{transform:rotateX(-90deg) translateZ(calc(var(--cu)/2));}
    .cf-F{transform:               translateZ(calc(var(--cu)/2));}
    .cf-B{transform:rotateY(180deg) translateZ(calc(var(--cu)/2));}
    .cf-R{transform:rotateY(90deg)  translateZ(calc(var(--cu)/2));}
    .cf-L{transform:rotateY(-90deg) translateZ(calc(var(--cu)/2));}
    .pad{                   /* the coloured sticker; inset creates the gaps */
      position:absolute; inset:7%; border-radius:14%;
      border:1px solid rgba(0,0,0,.45);
      box-shadow:inset 0 -3px 6px rgba(0,0,0,.18);
      cursor:pointer; transition:transform .08s;
    }
    .pad:active{transform:scale(.9);}
    .pad.fixed{cursor:default;}
    .pad.turn{outline:3px solid var(--accent);outline-offset:2px;box-shadow:0 0 12px var(--accent);}

    /* ── view rotation controls ── */
    .viewctrl{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .viewctrl button{background:var(--panel2);}

    /* ── palette ── */
    #paletteWrap{text-align:center;}
    .hint{font-size:.74rem;color:var(--muted);margin-bottom:8px;}
    #palette{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .swatch{
      width:40px;height:40px;border-radius:9px;border:2px solid #000;cursor:pointer;
      transition:transform .1s, box-shadow .1s;
    }
    .swatch.sel{transform:scale(1.12);box-shadow:0 0 0 3px var(--text);}

    /* ── buttons ── */
    .btnrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
    button{
      font-family:inherit;font-weight:600;font-size:.9rem;border:none;border-radius:10px;
      padding:11px 14px;color:#fff;background:var(--panel2);cursor:pointer;
      transition:transform .08s,background .15s;
    }
    button:active{transform:translateY(1px);}
    .primary{background:var(--accent);}
    .primary:active{background:var(--accentd);}
    .grow{flex:1;min-width:120px;}

    #status{min-height:1.2em;font-size:.85rem;text-align:center;color:var(--muted);padding:0 4px;}
    #status.warn{color:#ff7a7a;}

    /* ── solve panel ── */
    #solvePanel{display:none;width:100%;max-width:460px;}
    #moveinfo{
      display:flex;flex-direction:column;align-items:center;gap:2px;
      padding:10px;margin-bottom:10px;text-align:center;
    }
    .bignote{font-size:2.4rem;font-weight:800;line-height:1;color:var(--accent);}
    .bigtext{font-size:1rem;font-weight:600;}
    .bigsub{font-size:.74rem;color:var(--muted);}
    .counter{font-size:.75rem;color:var(--muted);margin-top:2px;}
    #movelist{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:12px;max-height:120px;overflow:auto;}
    .movechip{
      font-family:'SFMono-Regular',Menlo,Consolas,monospace;font-weight:700;font-size:.8rem;
      background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:5px 8px;cursor:pointer;
    }
    .movechip.done{opacity:.4;}
    .movechip.current{background:var(--accent);border-color:var(--accent);transform:scale(1.08);}
    .player{display:flex;gap:6px;justify-content:center;align-items:center;}
    .player button{padding:11px 12px;min-width:48px;font-size:1.05rem;}

    .backlink{position:absolute;top:12px;left:14px;color:var(--muted);text-decoration:none;font-size:.85rem;}
    .backlink:active{color:#fff;}

    footer{font-size:.7rem;color:#55555a;text-align:center;margin-top:4px;}
  </style>
</head>
<body>
  <a class="backlink" href="../../index.html">← Alle spellen</a>
  <header>
    <h1>🧩 Kubus&nbsp;Solver</h1>
    <p>Kleur je kubus in en los hem stap voor stap op</p>
  </header>

  <div class="scene"><div class="tilt"><div id="cube" class="cube"></div></div></div>

  <div class="viewctrl">
    <button id="rotSide" title="Draai de kubus opzij">↔ Draai opzij</button>
    <button id="rotUp" title="Draai de kubus omhoog">↕ Draai omhoog</button>
  </div>

  <div id="status"></div>

  <div id="paletteWrap" class="card">
    <div class="hint">Draai de kubus met de knoppen, kies een kleur en tik op de vlakjes. De middens staan vast.</div>
    <div id="palette"></div>
  </div>

  <div id="editControls" class="btnrow card">
    <button id="scrambleBtn" class="grow">🎲 Door elkaar</button>
    <button id="resetBtn" class="grow">↺ Leegmaken</button>
    <button id="solveBtn" class="primary grow">✨ Los op!</button>
  </div>

  <div id="solvePanel" class="card">
    <div id="moveinfo"></div>
    <div id="movelist"></div>
    <div class="player">
      <button id="firstBtn" title="Begin">⏮</button>
      <button id="prevBtn" title="Vorige">◀</button>
      <button id="playBtn" class="primary">▶ Speel af</button>
      <button id="nextBtn" title="Volgende">▶</button>
      <button id="lastBtn" title="Einde">⏭</button>
    </div>
    <div class="btnrow" style="margin-top:10px;">
      <button id="editBtn" class="grow">✎ Opnieuw invoeren</button>
    </div>
  </div>

  <footer>Werkt volledig offline · Efficiënte oplossing in ±20 zetten (two-phase)</footer>

  <script id="solver-src">/*__SOLVER__*/</script>
  <script id="kociemba-src">/*__KOCIEMBA__*/</script>
  <script>/*__APP__*/</script>
</body>
</html>
