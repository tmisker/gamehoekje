<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wafelwoorden</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121213;
      color: white;
      font-family: 'Arial Black', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      touch-action: none; /* prevent page scroll while dragging */
    }

    header { text-align: center; margin-bottom: 14px; }
    header h1 { font-size: 1.8rem; letter-spacing: 4px; text-transform: uppercase; }
    header p  { color: #888; font-size: 0.8rem; letter-spacing: 2px; margin-top: 4px; }

    /* ── Controls ── */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 400px;
    }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      background: #3a3a3c;
      color: white;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover  { background: #555; }
    button:active { transform: scale(0.95); }
    button.active { background: #538d4e; }

    /* Mode buttons */
    #mode-row button.active { background: #5b8cff; }

    /* Difficulty buttons */
    #diff-easy.active   { background: #538d4e; }
    #diff-normal.active { background: #b59f3b; }
    #diff-hard.active   { background: #8b3a3a; }

    /* ── Swaps counter ── */
    #swaps {
      font-size: 1rem;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    #swaps-left { font-size: 1.4rem; font-weight: bold; }
    #swaps.low  { color: #d9a03d; }

    #message .loss-words { font-size: 0.85rem; color: #aaa; font-weight: normal; }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(var(--n, 5), var(--cell, 68px));
      grid-template-rows:    repeat(var(--n, 5), var(--cell, 68px));
      gap: var(--gap, 6px);
    }

    .cell {
      width: var(--cell, 68px);
      height: var(--cell, 68px);
      border-radius: var(--br, 10px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--fs, 27px);
      font-weight: 900;
      text-transform: uppercase;
      user-select: none;
      cursor: grab;
      transition: transform 0.1s, box-shadow 0.15s, opacity 0.1s;
    }
    .cell:active { cursor: grabbing; }

    .cell.empty {
      background: transparent;
      cursor: default;
      pointer-events: none;
    }

    .cell.green  { background: #538d4e; cursor: default; }
    .cell.yellow { background: #b59f3b; }
    .cell.gray   { background: #3a3a3c; }

    /* drag/touch feedback */
    .cell.dragging  { opacity: 0.35; transform: scale(1.12); }
    .cell.drag-over { box-shadow: 0 0 0 3px white; transform: scale(1.08); }

    /* ── Message ── */
    #message {
      margin-top: 24px;
      font-size: 1.4rem;
      font-weight: bold;
      min-height: 2rem;
      text-align: center;
    }

    #bottom-buttons { display: flex; gap: 10px; margin-top: 14px; }
    #bottom-buttons button { padding: 10px 22px; font-size: 1rem; }

    /* ── Winst-animatie: rondvliegende emoji's ── */
    #celebration {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 100;
    }
    .fly-emoji {
      position: absolute;
      top: 0;
      left: 0;
      line-height: 1;
      animation: emoji-fly linear forwards;
      will-change: transform, opacity;
    }
    @keyframes emoji-fly {
      from { transform: translate(var(--x0), var(--y0)) rotate(0deg);        opacity: 1; }
      80%  { opacity: 1; }
      to   { transform: translate(var(--x1), var(--y1)) rotate(var(--rot)); opacity: 0; }
    }
    .backlink{position:absolute;top:12px;left:14px;color:#888;text-decoration:none;font-size:.85rem;font-family:Arial,sans-serif;font-weight:normal;}
  </style>
</head>
<body>
  <a class="backlink" href="../../index.html">← Alle spellen</a>

  <header>
    <h1>Wafelwoorden</h1>
    <p id="puzzle-subtitle"></p>
  </header>

  <div id="controls">
    <!-- spelmodus -->
    <div class="btn-row" id="mode-row">
      <button id="mode-klassiek" onclick="setMode('klassiek')">🧇 Klassiek</button>
      <button id="mode-groot"    onclick="setMode('groot')">🍿 Groot</button>
    </div>
    <!-- moeilijkheid -->
    <div class="btn-row">
      <button id="diff-easy"   onclick="setDifficulty('makkelijk')">😊 Makkelijk</button>
      <button id="diff-normal" onclick="setDifficulty('normaal')">🙂 Normaal</button>
      <button id="diff-hard"   onclick="setDifficulty('moeilijk')">😤 Moeilijk</button>
    </div>
  </div>

  <div id="swaps">Nog <span id="swaps-left">15</span> <span id="swaps-word">wissels</span> over</div>

  <div id="grid"></div>

  <div id="message"></div>
  <div id="celebration"></div>
  <div id="bottom-buttons">
    <button onclick="restartGame()">🔄 Opnieuw</button>
    <button onclick="newGame()">✨ Nieuw spel</button>
  </div>

  <script>
  // ══════════════════════════════════════════════════════════════
  //  WOORDENLIJSTEN — veelgebruikte Nederlandse woorden
  //  Veilig, geschikt voor kinderen vanaf ~10 jaar
  // ══════════════════════════════════════════════════════════════
  const WORDS5 = [
    // A
    'AAPJE','AARDE','ABDIJ','AFDAK','AFVAL','ALARM','AMBER','ANDER','ANGEL',
    'ANGST','ANKER','APART','APPEL','AREND','ATLAS','AVOND',
    // B
    'BAARD','BAKEN','BALEN','BEEST','BEGIN','BEKER','BENDE','BEREN','BETER',
    'BEURT','BEZEM','BEZIG','BINGO','BLANK','BLAAR','BLIND','BLITS','BLOED',
    'BLOEM','BLOND','BOCHT','BODEM','BOMEN','BONEN','BONUS','BOORD','BOREN',
    'BOSJE','BOTER','BOVEN','BRAAF','BRAND','BREED','BRIEF','BROEK','BROOD',
    'BRUIN','BUIEN','BUREN','BEURS','BUURT',
    // C
    'CHAOS','CLOWN','COACH','COBRA',
    // D
    'DALEN','DAMES','DARTS','DATUM','DEKEN','DEELT','DELER','DENKT','DEPOT',
    'DERDE','DICHT','DIEPE','DIEET','DIENT','DIKTE','DINER','DONOR','DOORN',
    'DOPEN','DOSIS','DRAAD','DRAAI','DRAAK','DRANK','DROOG','DROOM','DRUIF',
    'DUREN','DWARS','DWERG',
    // E
    'ECHTE','EFFEN','EIGEN','EIKEL','EINDE','ELAND','ELITE','EMMER','ENGEL',
    'ENKEL','ENORM',
    // F
    'FALEN','FAUNA','FEEST','FIETS','FLAUW','FLINK','FLUIT','FOLIE','FORUM',
    'FRAAI','FRIET','FRUIT',
    // G
    'GALOP','GARDE','GATEN','GAVEN','GAZON','GEBED','GEEFT','GEEST','GELUK',
    'GENIE','GERST','GEVEN','GEVEL','GEWAS','GEZIN','GIRAF','GLANS','GOEDE',
    'GRAAN','GRAAF','GRAAT','GRENS','GRIJS','GROEN','GROEI','GROEP','GROET',
    'GROOT','GROND',
    // H
    'HAAST','HAGEL','HAARD','HAKEN','HALVE','HAMER','HAVEN','HAVIK','HEEFT',
    'HEIDE','HEKEL','HELFT','HEMEL','HETEN','HINTS','HITTE','HOEDE','HOEST',
    'HOGER','HOPEN','HOORN','HOORT','HORDE','HOTEL','HULDE','HUMOR','HUREN',
    // I
    'IDOOL','IJZER','IMKER','INHAM','INVAL','INZET','IVOOR',
    // J
    'JAGER','JEUGD','JOKER','JUBEL','JUIST',
    // K
    'KAARS','KAART','KABEL','KADER','KAMER','KAPOT','KASSA','KATER','KEERT',
    'KEREN','KETEL','KEUZE','KIEST','KLAAR','KLANK','KLEED','KLEUR','KLOMP',
    'KLOOF','KLOPT','KNOOP','KOERS','KOETS','KOKEN','KOLEN','KOMST','KOOPT',
    'KOORD','KOPJE','KORST','KORTE','KRAAL','KRAAN','KRANT','KREEK','KROON',
    'KRUID','KRUIS','KUDDE','KUNST','KUREN','KWAAD','KWAST',
    // L
    'LAARS','LACHT','LADEN','LAKEN','LANGE','LANGS','LASER','LATER','LATEN',
    'LEDER','LEEUW','LEERT','LEEST','LEGEN','LEGER','LENEN','LEPEL','LEREN',
    'LEVEL','LEVER','LICHT','LIJST','LINDE','LINKS','LOPEN','LOPER','LOOPT',
    'LOTUS','LUCHT','LUIER','LUNCH',
    // M
    'MAAND','MAAKT','MAGER','MAKER','MANEN','MANGO','MARKT','MASSA','MEDIA',
    'MEEST','MENEN','MEREL','METER','METEN','MOLEN','MOOIE','MOTOR','MUREN',
    // N
    'NAALD','NAAST','NACHT','NADER','NAGEL','NAMEN','NAVEL','NEGEN','NEMEN',
    'NEVEL','NIEUW','NIETS','NOBEL','NODIG','NOEMT','NOREN','NOTEN',
    // O
    'OEVER','OFFER','OMEGA','OOGST','OPERA','OPRIT','OPZIJ','ORDER','ORGEL',
    'OTTER','OUDER','OVAAL',
    // P
    'PAARD','PALET','PANDA','PANEL','PAREL','PASEN','PASTA','PAUZE','PEPER',
    'PIANO','PIZZA','PLAKT','PLANK','PLANT','PLEIN','POETS','POEMA','POORT',
    'PRAAT','PRIJS','PRINS','PROEF',
    // R
    'RAAKT','RADEN','RAKEN','RAKET','RAMEN','REBEL','RECHT','REEKS','REGEN',
    'REGEL','REIST','RENTE','RIOOL','RITME','ROBOT','ROEPT','ROEST','ROKEN',
    'ROMAN','RONDE','ROVER','ROZEN','RUZIE',
    // S
    'SABEL','SALDO','SCHAT','SCHEP','SCHIP','SLAAP','SLAAT','SLANG','SLOOT',
    'SLUIT','SMAAK','SMART','SMELT','SNOEP','SOORT','SPEEL','SPEER','SPIER',
    'SPOOK','SPORT','STAAL','STAAN','STAAT','STEEN','STIER','STOEL','STOEP',
    'STOER','STOMP','STOOM','STORM','STOUT','STRAF','STRIK','STRIP','STUUR',
    'SUPER',
    // T
    'TAART','TAFEL','TAKEN','TANTE','TEKST','TEGEL','TEKEN','TEMPO','TITEL',
    'TOCHT','TONEN','TOREN','TOVER','TREIN','TREKT','TROEF','TROEP','TROTS',
    'TROUW',
    // U
    'UILEN',
    // V
    'VAART','VADER','VAREN','VECHT','VEGEN','VEREN','VERSE','VEZEL',
    'VINDT','VIOOL','VLEES','VLOER','VLOOT','VOCHT','VOELT','VOGEL','VRAAG',
    'VREDE','VROUW','VUREN','VUIST',
    // W
    'WAARD','WACHT','WAGEN','WAPEN','WATER','WERKT','WETEN','WEVER','WEZEN',
    'WIJST','WINST','WOEDE','WONEN','WORST',
    // Z
    'ZACHT','ZAKEN','ZEGEN','ZEKER','ZEVEN','ZINGT','ZOEKT','ZOMER','ZWAAN',
    'ZWAAR','ZWART','ZWEET','ZWERM',
  ];

  // Veelgebruikte Nederlandse 7-letterwoorden (voor de "Groot"-modus)
  const WORDS7 = [
    'AMANDEL','ARTIKEL','BANANEN','BEDRIJF','BEHOREN','BELOFTE','BERICHT','BESTAAN',
    'BLIKSEM','BLOEMEN','BROEDER','CIRKELS','CONCERT','DAGBOEK','DIAMANT','DINSDAG',
    'DOKTERS','DOLFIJN','DRAAIEN','DRUIVEN','FABRIEK','FAMILIE','FANTOOM','FEESTJE',
    'FONTEIN','GARNAAL','GEDICHT','GESPREK','GEVAREN','GITAREN','GORDIJN','GROENTE',
    'HAMSTER','HANDVAT','IJSBEER','JASMIJN','KALKOEN','KANARIE','KASTEEL','KETTING',
    'KIKKERS','KLEUREN','KNUFFEL','KOEKJES','KOFFERS','KOMEDIE','KRIEBEL','LAARZEN',
    'LADDERS','LAMPION','LEEUWEN','MACHINE','MAGNEET','MEISJES','MELODIE','NACHTEN',
    'NOTITIE','OCEANEN','OLIFANT','ONTBIJT','ORKANEN','PANTERS','PARAPLU','PARKIET',
    'PENSEEL','PINGUIN','PLANEET','PLANKEN','POTLOOD','PRINSES','PUDDING','PUZZELS',
    'RIDDERS','SCHAPEN','SCHEPEN','SEIZOEN','SLAKKEN','SLEUTEL','SNOEPJE','SPIEGEL',
    'SPINNEN','SPORTEN','STATION','STENGEL','STOELEN','STORMEN','TEKENEN','THEATER',
    'TIJGERS','TOMATEN','TREINEN','TROMPET','VERHAAL','VINGERS','VISSERS','VLAGGEN',
    'VLINDER','VOETBAL','VULKAAN','WEKKERS','WINKELS','WINTERS','WORTELS','ZANDBAK',
    'ZEEHOND','ZWEMBAD','AARDBEI','BROODJE','CADEAUS','DIERTJE','FIETSEN','HOOFDEN',
    'JONGENS','KAPSTOK','KLOKKEN','KOETSEN','KRENTEN','LAMPJES','LICHTJE','MANDJES',
    'MEUBELS','POESJES','STOKJES','STRIKJE','TENTJES','VLIEGEN','WOLKJES','BAKKERS',
    'BALLONS','BEERTJE','BOEKJES','EENDJES','FLESSEN','HAGEDIS','KAARTEN','KAMELEN',
    'KAPPERS','KASTJES','LEEUWIN','MONSTER','PLASSEN','POORTEN','RUPSJES','SNAVELS',
    'STERREN','STOKKEN','TROLLEN','VLEKKEN','ZAKDOEK','ZEESTER',
  ];

  // ══════════════════════════════════════════════════════════════
  //  WOORD-INDEX per lengte (positie → letter → woorden)
  // ══════════════════════════════════════════════════════════════
  function buildIndex(words, len) {
    const idx = Array.from({length: len}, () => ({}));
    for (const w of words) {
      for (let i = 0; i < len; i++) {
        const ch = w[i];
        (idx[i][ch] || (idx[i][ch] = [])).push(w);
      }
    }
    return idx;
  }

  const ALLWORDS = {5: WORDS5, 7: WORDS7};
  const INDEX    = {5: buildIndex(WORDS5, 5), 7: buildIndex(WORDS7, 7)};

  function findMatching(idx, constraints) {
    let result = null;
    for (const [pos, ch] of constraints) {
      const words = idx[pos][ch] || [];
      if (!result) {
        result = new Set(words);
      } else {
        const next = new Set();
        for (const w of words) if (result.has(w)) next.add(w);
        result = next;
      }
      if (result.size === 0) return [];
    }
    return result ? [...result] : [];
  }

  function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ══════════════════════════════════════════════════════════════
  //  SPELMODI — elk een rooster met "woordvakken" (slots).
  //  Een slot is de geordende lijst cellen [r,c] van één woord; de
  //  woordlengte volgt uit het aantal cellen. Cellen die in twee slots
  //  voorkomen zijn kruispunten (moeten dezelfde letter krijgen).
  //  De slots staan in de volgorde waarin de generator ze invult:
  //  eerst de losse woorden, dan de zwaar-beperkte kruiswoorden.
  // ══════════════════════════════════════════════════════════════
  function rowCells(r, cStart, len) { const a = []; for (let i = 0; i < len; i++) a.push([r, cStart + i]); return a; }
  function colCells(c, rStart, len) { const a = []; for (let i = 0; i < len; i++) a.push([rStart + i, c]); return a; }

  // Noodpuzzels — als de generator onverhoopt niets vindt binnen de tijd.
  const FALLBACK_KLASSIEK = [
    [['T','R','O','T','S'],['A',null,'P',null,'P'],['A','A','R','D','E'],['R',null,'I',null,'E'],['T','I','T','E','L']],
    [['K','L','O','O','F'],['E',null,'O',null,'A'],['R','E','G','E','L'],['E',null,'S',null,'E'],['N','O','T','E','N']],
    [['P','E','P','E','R'],['A',null,'L',null,'A'],['A','L','A','R','M'],['R',null,'N',null,'E'],['D','E','K','E','N']],
    [['B','L','O','E','D'],['R',null,'M',null,'R'],['O','P','E','R','A'],['O',null,'G',null,'A'],['D','R','A','N','K']],
  ];

  const FALLBACK_GROOT = [
    [[null,null,null,'S',null,null,null],[null,'P','E','P','E','R',null],[null,'L',null,'O',null,'O',null],['L','A','A','R','Z','E','N'],[null,'N',null,'T',null,'P',null],[null,'K','I','E','S','T',null],[null,null,null,'N',null,null,null]],
    [[null,null,null,'K',null,null,null],[null,'F','L','A','U','W',null],[null,'I',null,'A',null,'I',null],['B','E','D','R','I','J','F'],[null,'T',null,'T',null,'S',null],[null,'S','M','E','L','T',null],[null,null,null,'N',null,null,null]],
    [[null,null,null,'K',null,null,null],[null,'M','A','R','K','T',null],[null,'E',null,'I',null,'R',null],['B','R','O','E','D','E','R'],[null,'E',null,'B',null,'K',null],[null,'L','E','E','R','T',null],[null,null,null,'L',null,null,null]],
    [[null,null,null,'S',null,null,null],[null,'B','O','C','H','T',null],[null,'E',null,'H',null,'R',null],['B','R','O','E','D','E','R'],[null,'E',null,'P',null,'K',null],[null,'N','O','E','M','T',null],[null,null,null,'N',null,null,null]],
  ];

  const MODES = {
    klassiek: {
      key: 'klassiek', label: 'Klassiek', size: 5,
      slots: [
        rowCells(0, 0, 5), // bovenste rij
        colCells(0, 0, 5), // linker kolom  (kruist rij 0)
        colCells(2, 0, 5), // midden kolom
        colCells(4, 0, 5), // rechter kolom
        rowCells(2, 0, 5), // midden rij    (kruist alle 3 kolommen)
        rowCells(4, 0, 5), // onderste rij
      ],
      fallbacks: FALLBACK_KLASSIEK,
      difficulty: {
        makkelijk: { preSwaps: 3,    maxSwaps: 12 },
        normaal:   { preSwaps: 7,    maxSwaps: 15 },
        moeilijk:  { preSwaps: null, maxSwaps: 15 },
      },
    },
    groot: {
      key: 'groot', label: 'Groot', size: 7,
      slots: [
        rowCells(3, 0, 7), // centrale rij    (7 letters)
        colCells(3, 0, 7), // centrale kolom  (7 letters, kruist centrale rij)
        colCells(1, 1, 5), // linker kolom    (5 letters, kruist centrale rij)
        colCells(5, 1, 5), // rechter kolom   (5 letters, kruist centrale rij)
        rowCells(1, 1, 5), // bovenste rij    (5 letters, 3 kruispunten)
        rowCells(5, 1, 5), // onderste rij    (5 letters, 3 kruispunten)
      ],
      fallbacks: FALLBACK_GROOT,
      difficulty: {
        makkelijk: { preSwaps: 5,    maxSwaps: 18 },
        normaal:   { preSwaps: 10,   maxSwaps: 22 },
        moeilijk:  { preSwaps: null, maxSwaps: 22 },
      },
    },
  };

  // Alle cellen (gededupliceerd) die een tegel dragen in deze modus.
  function modePositions(mode) {
    const seen = new Set(); const out = [];
    for (const slot of mode.slots)
      for (const [r, c] of slot) {
        const k = r + ',' + c;
        if (!seen.has(k)) { seen.add(k); out.push([r, c]); }
      }
    return out;
  }

  // ══════════════════════════════════════════════════════════════
  //  PUZZELGENERATOR — vult de slots met woorden zodat alle
  //  kruispunten kloppen (backtracking met woord-index per lengte)
  // ══════════════════════════════════════════════════════════════
  function generatePuzzle(mode) {
    const t0 = Date.now();
    const cell2 = {};            // "r,c" -> reeds vastgelegde letter
    const used = new Set();      // reeds gebruikte woorden (blijven uniek)
    const chosen = new Array(mode.slots.length).fill(null);

    function backtrack(i) {
      if (Date.now() - t0 > 3000) return false;
      if (i === mode.slots.length) return true;

      const slot = mode.slots[i];
      const len = slot.length;
      const idx = INDEX[len];

      const cons = [];
      for (let k = 0; k < len; k++) {
        const key = slot[k][0] + ',' + slot[k][1];
        const v = cell2[key];
        if (v !== undefined) cons.push([k, v]);
      }

      let cands = cons.length ? findMatching(idx, cons) : ALLWORDS[len];
      cands = shuffleArray(cands);

      for (const w of cands) {
        if (Date.now() - t0 > 3000) break;
        if (used.has(w)) continue;

        used.add(w); chosen[i] = w;
        const setKeys = [];
        for (let k = 0; k < len; k++) {
          const key = slot[k][0] + ',' + slot[k][1];
          if (cell2[key] === undefined) { cell2[key] = w[k]; setKeys.push(key); }
        }

        if (backtrack(i + 1)) return true;

        for (const key of setKeys) delete cell2[key];
        used.delete(w); chosen[i] = null;
      }
      return false;
    }

    if (backtrack(0)) {
      const n = mode.size;
      const grid = Array.from({length: n}, () => Array(n).fill(null));
      mode.slots.forEach((slot, i) => {
        const w = chosen[i];
        slot.forEach(([r, c], k) => { grid[r][c] = w[k]; });
      });
      return grid;
    }

    // Noodoplossing
    const fb = mode.fallbacks[Math.floor(Math.random() * mode.fallbacks.length)];
    return fb.map(row => row.slice());
  }

  // ══════════════════════════════════════════════════════════════
  //  SPELSTATUS
  // ══════════════════════════════════════════════════════════════
  let gameNumber = 0;
  let currentModeKey = 'klassiek';
  let currentMode = MODES[currentModeKey];
  let currentPositions = modePositions(currentMode);
  let currentDifficulty = 'normaal';
  let currentSolution;
  let initialGrid;
  let currentGrid;
  let swapsLeft;
  let gameOver = false;

  // ══════════════════════════════════════════════════════════════
  //  PUZZEL OPBOUWEN (schudden binnen het huidige rooster)
  // ══════════════════════════════════════════════════════════════
  function makePuzzleGrid(solution, difficulty) {
    const cfg = currentMode.difficulty[difficulty];
    const positions = currentPositions;

    while (true) {
      const grid = solution.map(row => row.map(v => v));

      if (cfg.preSwaps === null) {
        const letters = positions.map(([r, c]) => solution[r][c]);
        for (let i = letters.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [letters[i], letters[j]] = [letters[j], letters[i]];
        }
        positions.forEach(([r, c], i) => { grid[r][c] = letters[i]; });
      } else {
        let swapsDone = 0;
        let tries = 0;
        while (swapsDone < cfg.preSwaps && tries < 500) {
          tries++;
          const i = Math.floor(Math.random() * positions.length);
          const j = Math.floor(Math.random() * positions.length);
          if (i === j) continue;
          const [r1, c1] = positions[i];
          const [r2, c2] = positions[j];
          // gelijke letters wisselen verandert niets — telt niet als schudding
          if (grid[r1][c1] === grid[r2][c2]) continue;
          if (grid[r1][c1] === solution[r1][c1] || grid[r2][c2] === solution[r2][c2]) {
            [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
            swapsDone++;
          }
        }
      }

      if (!isSolved(grid, solution)) return grid;
    }
  }

  function isSolved(grid, solution) {
    return currentPositions.every(([r, c]) => grid[r][c] === solution[r][c]);
  }

  // ══════════════════════════════════════════════════════════════
  //  KLEURLOGICA  (2-pass per woord, groen > geel > grijs)
  // ══════════════════════════════════════════════════════════════
  function computeColors(grid, solution) {
    const n = currentMode.size;
    const colors = Array.from({length: n}, () => Array(n).fill(null));
    const priority = {green: 3, yellow: 2, gray: 1};

    for (const positions of currentMode.slots) {
      const solutionCounts = {};
      for (const [r, c] of positions) {
        const l = solution[r][c];
        solutionCounts[l] = (solutionCounts[l] || 0) + 1;
      }

      const remaining = {...solutionCounts};
      const wc = {};
      for (const [r, c] of positions) {
        if (grid[r][c] === solution[r][c]) {
          wc[`${r},${c}`] = 'green';
          remaining[solution[r][c]]--;
        }
      }

      for (const [r, c] of positions) {
        if (wc[`${r},${c}`] === 'green') continue;
        const letter = grid[r][c];
        if ((remaining[letter] || 0) > 0) {
          wc[`${r},${c}`] = 'yellow';
          remaining[letter]--;
        } else {
          wc[`${r},${c}`] = 'gray';
        }
      }

      for (const [r, c] of positions) {
        const existing = colors[r][c];
        if (existing === null || priority[wc[`${r},${c}`]] > priority[existing]) {
          colors[r][c] = wc[`${r},${c}`];
        }
      }
    }

    return colors;
  }

  // ══════════════════════════════════════════════════════════════
  //  ROOSTERMATEN — kleiner bij grotere roosters, past op het scherm
  // ══════════════════════════════════════════════════════════════
  function gridMetrics(n) {
    const avail = Math.min((window.innerWidth || 400) - 24, 460);
    const gap = n >= 7 ? 5 : 6;
    let cell = Math.floor((avail - (n - 1) * gap) / n);
    cell = Math.max(30, Math.min(68, cell));
    const fs = Math.round(cell * 0.4);
    const br = Math.max(6, Math.round(cell * 0.14));
    return {cell, gap, fs, br};
  }

  // ══════════════════════════════════════════════════════════════
  //  RENDEREN
  // ══════════════════════════════════════════════════════════════
  function render() {
    const gridEl = document.getElementById('grid');
    const n = currentMode.size;

    const {cell, gap, fs, br} = gridMetrics(n);
    gridEl.style.setProperty('--n', n);
    gridEl.style.setProperty('--cell', cell + 'px');
    gridEl.style.setProperty('--gap', gap + 'px');
    gridEl.style.setProperty('--fs', fs + 'px');
    gridEl.style.setProperty('--br', br + 'px');

    gridEl.innerHTML = '';
    const colors = computeColors(currentGrid, currentSolution);

    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        const letter = currentGrid[r][c];
        const cellEl = document.createElement('div');
        cellEl.classList.add('cell');

        if (letter === null) {
          cellEl.classList.add('empty');
        } else {
          cellEl.classList.add(colors[r][c]);
          cellEl.textContent = letter;
          cellEl.dataset.r = r;
          cellEl.dataset.c = c;

          // Groene letters staan al goed: die kun je niet meer wisselen
          if (!gameOver && colors[r][c] !== 'green') {
            cellEl.draggable = true;
            cellEl.addEventListener('dragstart', onDragStart);
            cellEl.addEventListener('dragend',   onDragEnd);
            cellEl.addEventListener('dragover',   onDragOver);
            cellEl.addEventListener('dragleave',  onDragLeave);
            cellEl.addEventListener('drop',       onDrop);

            cellEl.addEventListener('touchstart', onTouchStart, {passive: false});
            cellEl.addEventListener('touchmove',  onTouchMove,  {passive: false});
            cellEl.addEventListener('touchend',   onTouchEnd,   {passive: false});
            cellEl.addEventListener('touchcancel', onTouchCancel);
          }
        }

        gridEl.appendChild(cellEl);
      }
    }

    document.getElementById('swaps-left').textContent = swapsLeft;
    document.getElementById('swaps-word').textContent = swapsLeft === 1 ? 'wissel' : 'wissels';
    document.getElementById('swaps').classList.toggle('low', swapsLeft <= 3);
    document.getElementById('puzzle-subtitle').textContent = currentMode.label + ' · Spel #' + gameNumber;
  }

  // ══════════════════════════════════════════════════════════════
  //  MUIS DRAG & DROP
  // ══════════════════════════════════════════════════════════════
  let dragSource = null;

  function onDragStart(e) {
    dragSource = {r: +this.dataset.r, c: +this.dataset.c};
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }
  function onDragEnd() {
    this.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    this.classList.add('drag-over');
  }
  function onDragLeave() {
    this.classList.remove('drag-over');
  }
  function onDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    if (!dragSource) return;
    performSwap(dragSource.r, dragSource.c, +this.dataset.r, +this.dataset.c);
    dragSource = null;
  }

  // ══════════════════════════════════════════════════════════════
  //  TOUCH DRAG
  // ══════════════════════════════════════════════════════════════
  let touchSrc = null;
  let touchTgt = null;

  function onTouchStart(e) {
    e.preventDefault();
    touchSrc = this;
    touchTgt = null;
    this.classList.add('dragging');
  }

  function onTouchMove(e) {
    e.preventDefault();
    const touch = e.touches[0];
    touchSrc.style.pointerEvents = 'none';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    touchSrc.style.pointerEvents = '';

    if (touchTgt && touchTgt !== el) touchTgt.classList.remove('drag-over');

    if (el && el.classList.contains('cell') && !el.classList.contains('empty') &&
        !el.classList.contains('green') && el !== touchSrc) {
      el.classList.add('drag-over');
      touchTgt = el;
    } else {
      touchTgt = null;
    }
  }

  function onTouchEnd(e) {
    e.preventDefault();
    touchSrc.classList.remove('dragging');
    if (touchTgt) {
      touchTgt.classList.remove('drag-over');
      performSwap(
        +touchSrc.dataset.r, +touchSrc.dataset.c,
        +touchTgt.dataset.r, +touchTgt.dataset.c
      );
    }
    touchSrc = null;
    touchTgt = null;
  }

  // Afgebroken sleep (bijv. systeemgebaar): sleepstatus netjes opruimen.
  function onTouchCancel() {
    if (touchSrc) touchSrc.classList.remove('dragging');
    if (touchTgt) touchTgt.classList.remove('drag-over');
    touchSrc = null;
    touchTgt = null;
  }

  // ══════════════════════════════════════════════════════════════
  //  WISSEL-LOGICA
  // ══════════════════════════════════════════════════════════════
  function performSwap(r1, c1, r2, c2) {
    if (r1 === r2 && c1 === c2) return;
    // Groene letters (al op hun plek) mogen niet mee wisselen
    if (currentGrid[r1][c1] === currentSolution[r1][c1] ||
        currentGrid[r2][c2] === currentSolution[r2][c2]) return;
    // Twee gelijke letters wisselen verandert niets — kost geen wissel
    if (currentGrid[r1][c1] === currentGrid[r2][c2]) return;
    [currentGrid[r1][c1], currentGrid[r2][c2]] =
      [currentGrid[r2][c2], currentGrid[r1][c1]];
    swapsLeft--;
    render();
    checkWin();
  }

  function checkWin() {
    const msgEl = document.getElementById('message');
    if (isSolved(currentGrid, currentSolution)) {
      gameOver = true;
      msgEl.textContent = '🎉 Geweldig! Je hebt het opgelost!';
      render();
      startCelebration();
    } else if (swapsLeft <= 0) {
      gameOver = true;
      const words = currentMode.slots.map(
        slot => slot.map(([r, c]) => currentSolution[r][c]).join('')
      );
      msgEl.innerHTML = '😢 Geen wissels meer. Probeer opnieuw!<br>' +
        '<span class="loss-words">De woorden waren: ' + words.join(', ') + '</span>';
      render();
    } else {
      msgEl.textContent = '';
    }
  }

  // ══════════════════════════════════════════════════════════════
  //  WINST-ANIMATIE — willekeurige emoji's vliegen over het scherm
  // ══════════════════════════════════════════════════════════════
  const CELEBRATION_EMOJI = [
    '🎉','🎊','⭐','🌟','✨','🥳','🏆','🧇','💛','💚',
    '🎈','🍀','🚀','🌈','😄','🙌','👏','💪','🔥','🦄',
  ];

  let celebrationTimer = null;

  function spawnFlyingEmoji(layer) {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const m = 90; // start/eindig ruim buiten beeld
    let x0, y0, x1, y1;
    const drift = () => (Math.random() - 0.5) * 0.7;
    switch (Math.floor(Math.random() * 4)) {
      case 0:  x0 = -m;    x1 = W + m; y0 = Math.random() * H; y1 = y0 + drift() * H; break;
      case 1:  x0 = W + m; x1 = -m;    y0 = Math.random() * H; y1 = y0 + drift() * H; break;
      case 2:  y0 = -m;    y1 = H + m; x0 = Math.random() * W; x1 = x0 + drift() * W; break;
      default: y0 = H + m; y1 = -m;    x0 = Math.random() * W; x1 = x0 + drift() * W; break;
    }

    const el = document.createElement('span');
    el.className = 'fly-emoji';
    el.textContent = CELEBRATION_EMOJI[Math.floor(Math.random() * CELEBRATION_EMOJI.length)];
    el.style.setProperty('--x0', x0 + 'px');
    el.style.setProperty('--y0', y0 + 'px');
    el.style.setProperty('--x1', x1 + 'px');
    el.style.setProperty('--y1', y1 + 'px');
    el.style.setProperty('--rot', Math.round(Math.random() * 1440 - 720) + 'deg');
    el.style.fontSize = Math.round(22 + Math.random() * 26) + 'px';
    el.style.animationDuration = (1.6 + Math.random() * 1.8).toFixed(2) + 's';
    el.addEventListener('animationend', () => el.remove());
    // Vangnet voor omgevingen zonder CSS-animaties (dan vuurt animationend nooit)
    setTimeout(() => el.remove(), 5000);
    layer.appendChild(el);
  }

  function startCelebration() {
    stopCelebration();
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const layer = document.getElementById('celebration');
    for (let i = 0; i < 12; i++) spawnFlyingEmoji(layer);
    let waves = 0;
    celebrationTimer = setInterval(() => {
      for (let i = 0; i < 6; i++) spawnFlyingEmoji(layer);
      if (++waves >= 7) stopCelebration(false);
    }, 350);
  }

  // clear=true haalt ook de al vliegende emoji's direct weg (bij nieuw spel);
  // zonder clear mogen ze hun baan afmaken.
  function stopCelebration(clear) {
    if (celebrationTimer !== null) {
      clearInterval(celebrationTimer);
      celebrationTimer = null;
    }
    if (clear) document.getElementById('celebration').innerHTML = '';
  }

  // ══════════════════════════════════════════════════════════════
  //  SPELBESTURING
  // ══════════════════════════════════════════════════════════════
  // "Opnieuw" herstelt exact dezelfde startpositie; alleen een nieuw spel of
  // een andere moeilijkheid/modus geeft een nieuwe schudding.
  function restartGame() {
    swapsLeft = currentMode.difficulty[currentDifficulty].maxSwaps;
    gameOver = false;
    currentGrid = initialGrid.map(row => [...row]);
    stopCelebration(true);
    document.getElementById('message').textContent = '';
    render();
    updateDiffButtons();
  }

  function newRound() {
    initialGrid = makePuzzleGrid(currentSolution, currentDifficulty);
    restartGame();
  }

  function newGame() {
    gameNumber++;
    currentSolution = generatePuzzle(currentMode);
    newRound();
  }

  function setMode(m) {
    if (!MODES[m]) return;
    currentModeKey = m;
    currentMode = MODES[m];
    currentPositions = modePositions(currentMode);
    updateModeButtons();
    newGame();
  }

  function setDifficulty(d) {
    currentDifficulty = d;
    newRound();
  }

  function updateModeButtons() {
    ['klassiek', 'groot'].forEach(m => {
      document.getElementById('mode-' + m).classList.toggle('active', m === currentModeKey);
    });
  }

  function updateDiffButtons() {
    ['makkelijk','normaal','moeilijk'].forEach(d => {
      const id = {makkelijk:'diff-easy', normaal:'diff-normal', moeilijk:'diff-hard'}[d];
      document.getElementById(id).classList.toggle('active', d === currentDifficulty);
    });
  }

  // Bij draaien/verkleinen van het scherm: tegels opnieuw meten (niet tijdens slepen).
  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { if (!touchSrc && currentGrid) render(); }, 150);
  });

  // ── Start ──
  updateModeButtons();
  newGame();
  </script>
</body>
</html>
