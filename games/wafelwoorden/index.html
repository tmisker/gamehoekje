<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wafelwoorden</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121213;
      color: white;
      font-family: 'Arial Black', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      touch-action: none; /* prevent page scroll while dragging */
    }

    header { text-align: center; margin-bottom: 14px; }
    header h1 { font-size: 1.8rem; letter-spacing: 4px; text-transform: uppercase; }
    header p  { color: #888; font-size: 0.8rem; letter-spacing: 2px; margin-top: 4px; }

    /* ── Controls ── */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 400px;
    }

    .btn-row { display: flex; gap: 8px; }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      background: #3a3a3c;
      color: white;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover  { background: #555; }
    button:active { transform: scale(0.95); }
    button.active { background: #538d4e; }

    /* Difficulty buttons */
    #diff-easy.active   { background: #538d4e; }
    #diff-normal.active { background: #b59f3b; }
    #diff-hard.active   { background: #8b3a3a; }

    /* ── Swaps counter ── */
    #swaps {
      font-size: 1rem;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    #swaps span { font-size: 1.4rem; font-weight: bold; }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(5, 68px);
      grid-template-rows:    repeat(5, 68px);
      gap: 6px;
    }

    .cell {
      width: 68px;
      height: 68px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      font-weight: 900;
      text-transform: uppercase;
      user-select: none;
      cursor: grab;
      transition: transform 0.1s, box-shadow 0.15s, opacity 0.1s;
    }
    .cell:active { cursor: grabbing; }

    .cell.empty {
      background: transparent;
      cursor: default;
      pointer-events: none;
    }

    .cell.green  { background: #538d4e; }
    .cell.yellow { background: #b59f3b; }
    .cell.gray   { background: #3a3a3c; }

    /* drag/touch feedback */
    .cell.dragging  { opacity: 0.35; transform: scale(1.12); }
    .cell.drag-over { box-shadow: 0 0 0 3px white; transform: scale(1.08); }

    /* ── Message ── */
    #message {
      margin-top: 24px;
      font-size: 1.4rem;
      font-weight: bold;
      min-height: 2rem;
      text-align: center;
    }

    #bottom-buttons { display: flex; gap: 10px; margin-top: 14px; }
    #bottom-buttons button { padding: 10px 22px; font-size: 1rem; }
    .backlink{position:absolute;top:12px;left:14px;color:#888;text-decoration:none;font-size:.85rem;font-family:Arial,sans-serif;font-weight:normal;}
  </style>
</head>
<body>
  <a class="backlink" href="../../index.html">← Alle spellen</a>

  <header>
    <h1>Wafelwoorden</h1>
    <p id="puzzle-subtitle"></p>
  </header>

  <div id="controls">
    <!-- difficulty -->
    <div class="btn-row">
      <button id="diff-easy"   onclick="setDifficulty('makkelijk')">😊 Makkelijk</button>
      <button id="diff-normal" onclick="setDifficulty('normaal')">🙂 Normaal</button>
      <button id="diff-hard"   onclick="setDifficulty('moeilijk')">😤 Moeilijk</button>
    </div>
  </div>

  <div id="swaps">Nog <span id="swaps-left">15</span> wissels over</div>

  <div id="grid"></div>

  <div id="message"></div>
  <div id="bottom-buttons">
    <button onclick="restartGame()">🔄 Opnieuw</button>
    <button onclick="newGame()">✨ Nieuw spel</button>
  </div>

  <script>
  // ══════════════════════════════════════════════════════════════
  //  WOORDENLIJST — veelgebruikte Nederlandse 5-letterwoorden
  //  Veilig, geschikt voor kinderen vanaf ~10 jaar
  // ══════════════════════════════════════════════════════════════
  const WORDS = [
    // A
    'AAPJE','AARDE','ABDIJ','AFDAK','AFVAL','ALARM','AMBER','ANDER','ANGEL',
    'ANGST','ANKER','APART','APPEL','AREND','ATLAS','AVOND',
    // B
    'BAARD','BAKEN','BALEN','BEEST','BEGIN','BEKER','BENDE','BEREN','BETER',
    'BEURT','BEZEM','BEZIG','BINGO','BLANK','BLAAR','BLIND','BLITS','BLOED',
    'BLOEM','BLOND','BOCHT','BODEM','BOMEN','BONEN','BONUS','BOORD','BOREN',
    'BOSJE','BOTER','BOVEN','BRAAF','BRAND','BREED','BRIEF','BROEK','BROOD',
    'BRUIN','BUIEN','BUREN','BEURS','BUURT',
    // C
    'CHAOS','CLOWN','COACH','COBRA',
    // D
    'DALEN','DAMES','DARTS','DATUM','DEKEN','DEELT','DELER','DENKT','DEPOT',
    'DERDE','DICHT','DIEPE','DIEET','DIENT','DIKTE','DINER','DONOR','DOORN',
    'DOPEN','DOSIS','DRAAD','DRAAI','DRAAK','DRANK','DROOG','DROOM','DRUIF',
    'DUREN','DWARS','DWERG',
    // E
    'ECHTE','EFFEN','EIGEN','EIKEL','EINDE','ELAND','ELITE','EMMER','ENGEL',
    'ENKEL','ENORM',
    // F
    'FALEN','FAUNA','FEEST','FIETS','FLAUW','FLINK','FLUIT','FOLIE','FORUM',
    'FRAAI','FRIET','FRUIT',
    // G
    'GALOP','GARDE','GATEN','GAVEN','GAZON','GEBED','GEEFT','GEEST','GELUK',
    'GENIE','GERST','GEVEN','GEVEL','GEWAS','GEZIN','GIRAF','GLANS','GOEDE',
    'GRAAN','GRAAF','GRAAT','GRENS','GRIJS','GROEN','GROEI','GROEP','GROET',
    'GROOT','GROND',
    // H
    'HAAST','HAGEL','HAARD','HAKEN','HALVE','HAMER','HAVEN','HAVIK','HEEFT',
    'HEIDE','HEKEL','HELFT','HEMEL','HETEN','HINTS','HITTE','HOEDE','HOEST',
    'HOGER','HOPEN','HOORN','HOORT','HORDE','HOTEL','HULDE','HUMOR','HUREN',
    // I
    'IDOOL','IJZER','IMKER','INHAM','INVAL','INZET','IVOOR',
    // J
    'JAGER','JEUGD','JOKER','JUBEL','JUIST','JUWEL',
    // K
    'KAARS','KAART','KABEL','KADER','KAMER','KAPOT','KASSA','KATER','KEERT',
    'KEREN','KETEL','KEUZE','KIEST','KLAAR','KLANK','KLEED','KLEUR','KLOMP',
    'KLOOF','KLOPT','KNOOP','KOERS','KOETS','KOKEN','KOLEN','KOMST','KOOPT',
    'KOORD','KOPJE','KORST','KORTE','KRAAL','KRAAN','KRANT','KREEK','KROON',
    'KRUID','KRUIS','KUDDE','KUNST','KUREN','KWAAD','KWAST',
    // L
    'LAARS','LACHT','LADEN','LAKEN','LANGE','LANGS','LASER','LATER','LATEN',
    'LEDER','LEEUW','LEERT','LEEST','LEGEN','LEGER','LENEN','LEPEL','LEREN',
    'LEVEL','LEVER','LICHT','LIJST','LINDE','LINKS','LOPEN','LOPER','LOOPT',
    'LOTUS','LUCHT','LUIER','LUNCH',
    // M
    'MAAND','MAAKT','MAGER','MAKER','MANEN','MANGO','MARKT','MASSA','MEDIA',
    'MEEST','MENEN','MEREL','METER','METEN','MOLEN','MOOIE','MOTOR','MUREN',
    // N
    'NAALD','NAAST','NACHT','NADER','NAGEL','NAMEN','NAVEL','NEGEN','NEMEN',
    'NEVEL','NIEUW','NIETS','NOBEL','NODIG','NOEMT','NOREN','NOTEN',
    // O
    'OEVER','OFFER','OMEGA','OOGST','OPERA','OPRIT','OPZIJ','ORDER','ORGEL',
    'OTTER','OUDER','OVAAL',
    // P
    'PAARD','PALET','PANDA','PANEL','PAREL','PASEN','PASTA','PAUZE','PEPER',
    'PIANO','PIZZA','PLAKT','PLANK','PLANT','PLEIN','POETS','POEMA','POORT',
    'PRAAT','PRIJS','PRINS','PROEF',
    // R
    'RAAKT','RADEN','RAKEN','RAKET','RAMEN','REBEL','RECHT','REEKS','REGEN',
    'REGEL','REIST','RENTE','RIOOL','RITME','ROBOT','ROEPT','ROEST','ROKEN',
    'ROMAN','RONDE','ROVER','ROZEN','RUZIE',
    // S
    'SABEL','SALDO','SCHAT','SCHEP','SCHIP','SLAAP','SLAAT','SLANG','SLOOT',
    'SLUIT','SMAAK','SMART','SMELT','SNOEP','SOORT','SPEEL','SPEER','SPIER',
    'SPOOK','SPORT','STAAL','STAAN','STAAT','STEEN','STIER','STOEL','STOEP',
    'STOER','STOMP','STOOM','STORM','STOUT','STRAF','STRIK','STRIP','STUUR',
    'SUPER',
    // T
    'TAART','TAFEL','TAKEN','TANTE','TEKST','TEGEL','TEKEN','TEMPO','TITEL',
    'TOCHT','TONEN','TOREN','TOVER','TREIN','TREKT','TROEF','TROEP','TROTS',
    'TROUW',
    // U
    'UILEN',
    // V
    'VAART','VADER','VAREN','VECHT','VEGEN','VELDT','VEREN','VERSE','VEZEL',
    'VINDT','VIOOL','VLEES','VLOER','VLOOT','VOCHT','VOELT','VOGEL','VRAAG',
    'VREDE','VROUW','VUREN','VUIST',
    // W
    'WAARD','WACHT','WAGEN','WAPEN','WATER','WERKT','WETEN','WEVER','WEZEN',
    'WIJST','WINST','WOEDE','WONEN','WORST',
    // Z
    'ZACHT','ZAKEN','ZEGEN','ZEKER','ZEVEN','ZINGT','ZOEKT','ZOMER','ZWAAN',
    'ZWAAR','ZWART','ZWEET','ZWERM',
  ];

  // ══════════════════════════════════════════════════════════════
  //  PUZZELGENERATOR — vindt 6 woorden die een geldig wafelrooster
  //  vormen (3 rijen + 3 kolommen met 9 kloppende kruispunten)
  // ══════════════════════════════════════════════════════════════

  function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildIndex(words) {
    const idx = Array.from({length: 5}, () => ({}));
    for (const w of words) {
      for (let i = 0; i < 5; i++) {
        const ch = w[i];
        (idx[i][ch] || (idx[i][ch] = [])).push(w);
      }
    }
    return idx;
  }

  function findMatching(idx, constraints) {
    let result = null;
    for (const [pos, ch] of constraints) {
      const words = idx[pos][ch] || [];
      if (!result) {
        result = new Set(words);
      } else {
        const next = new Set();
        for (const w of words) if (result.has(w)) next.add(w);
        result = next;
      }
      if (result.size === 0) return [];
    }
    return result ? [...result] : [];
  }

  function generatePuzzle() {
    const idx = buildIndex(WORDS);
    const allWords = shuffleArray(WORDS);
    const t0 = Date.now();

    for (const row0 of allWords) {
      if (Date.now() - t0 > 3000) break;

      const c0list = shuffleArray(idx[0][row0[0]] || []);
      for (const col0 of c0list) {
        if (col0 === row0) continue;

        const c2list = shuffleArray(idx[0][row0[2]] || []);
        for (const col2 of c2list) {
          if (col2 === row0 || col2 === col0) continue;

          // Vroege check: bestaat er een woord met col0[2]@pos0 en col2[2]@pos2?
          const partial = findMatching(idx, [[0, col0[2]], [2, col2[2]]]);
          if (partial.length === 0) continue;

          const c4list = shuffleArray(idx[0][row0[4]] || []);
          for (const col4 of c4list) {
            if (col4 === row0 || col4 === col0 || col4 === col2) continue;

            const row2s = findMatching(idx, [[0, col0[2]], [2, col2[2]], [4, col4[2]]]);
            if (row2s.length === 0) continue;

            for (const row2 of shuffleArray(row2s)) {
              if (row2 === row0 || row2 === col0 || row2 === col2 || row2 === col4) continue;

              const row4s = findMatching(idx, [[0, col0[4]], [2, col2[4]], [4, col4[4]]]);
              for (const row4 of shuffleArray(row4s)) {
                if (row4 === row0 || row4 === col0 || row4 === col2 || row4 === col4 || row4 === row2) continue;

                return [
                  [row0[0], row0[1], row0[2], row0[3], row0[4]],
                  [col0[1], null,    col2[1], null,    col4[1]],
                  [row2[0], row2[1], row2[2], row2[3], row2[4]],
                  [col0[3], null,    col2[3], null,    col4[3]],
                  [row4[0], row4[1], row4[2], row4[3], row4[4]],
                ];
              }
            }
          }
        }
      }
    }

    // Noodoplossing: een van de ingebouwde puzzels
    return FALLBACK_PUZZLES[Math.floor(Math.random() * FALLBACK_PUZZLES.length)];
  }

  // ══════════════════════════════════════════════════════════════
  //  NOODPUZZELS — als de generator onverhoopt niets vindt
  // ══════════════════════════════════════════════════════════════
  const FALLBACK_PUZZLES = [
    [['S','T','O','E','R'],['T',null,'M',null,'A'],['O','P','E','R','A'],['M',null,'G',null,'K'],['P','L','A','N','T']],
    [['K','A','A','R','S'],['O',null,'A',null,'O'],['L','E','R','E','N'],['E',null,'D',null,'G'],['N','I','E','T','S']],
    [['D','R','O','O','M'],['A',null,'E',null,'O'],['L','E','V','E','L'],['E',null,'V',null,'E'],['N','O','R','E','N']],
    [['V','E','L','D','T'],['L',null,'A',null,'O'],['O','R','D','E','R'],['O',null,'E',null,'E'],['T','O','N','E','N']],
  ];

  // ══════════════════════════════════════════════════════════════
  //  WAFFLE-PATROON: posities met een tegel
  // ══════════════════════════════════════════════════════════════
  const WAFFLE_POSITIONS = [];
  for (let r = 0; r < 5; r++)
    for (let c = 0; c < 5; c++)
      if (!(r % 2 === 1 && c % 2 === 1))
        WAFFLE_POSITIONS.push([r, c]);

  // ══════════════════════════════════════════════════════════════
  //  SPELSTATUS
  // ══════════════════════════════════════════════════════════════
  let gameNumber = 0;
  let currentDifficulty = 'normaal';
  let currentSolution;
  let currentGrid;
  let swapsLeft;
  let gameOver = false;

  const DIFFICULTY_CONFIG = {
    makkelijk: { preSwaps: 3,  maxSwaps: 12 },
    normaal:   { preSwaps: 7,  maxSwaps: 15 },
    moeilijk:  { preSwaps: null, maxSwaps: 15 }, // null = volledig schudden
  };

  // ══════════════════════════════════════════════════════════════
  //  PUZZEL OPBOUWEN
  // ══════════════════════════════════════════════════════════════
  function makePuzzleGrid(solution, difficulty) {
    const cfg = DIFFICULTY_CONFIG[difficulty];

    const grid = solution.map(row => row.map(v => v));

    if (cfg.preSwaps === null) {
      const letters = WAFFLE_POSITIONS.map(([r, c]) => solution[r][c]);
      for (let i = letters.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [letters[i], letters[j]] = [letters[j], letters[i]];
      }
      WAFFLE_POSITIONS.forEach(([r, c], i) => { grid[r][c] = letters[i]; });
    } else {
      let swapsDone = 0;
      let tries = 0;
      while (swapsDone < cfg.preSwaps && tries < 500) {
        tries++;
        const i = Math.floor(Math.random() * WAFFLE_POSITIONS.length);
        const j = Math.floor(Math.random() * WAFFLE_POSITIONS.length);
        if (i === j) continue;
        const [r1, c1] = WAFFLE_POSITIONS[i];
        const [r2, c2] = WAFFLE_POSITIONS[j];
        if (grid[r1][c1] === solution[r1][c1] || grid[r2][c2] === solution[r2][c2]) {
          [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
          swapsDone++;
        }
      }
    }

    if (isSolved(grid, solution)) return makePuzzleGrid(solution, difficulty);
    return grid;
  }

  function isSolved(grid, solution) {
    return WAFFLE_POSITIONS.every(([r, c]) => grid[r][c] === solution[r][c]);
  }

  // ══════════════════════════════════════════════════════════════
  //  KLEURLOGICA  (2-pass per woord, groen > geel > grijs)
  // ══════════════════════════════════════════════════════════════
  function computeColors(grid, solution) {
    const colors = Array.from({length: 5}, () => Array(5).fill(null));

    const wordGroups = [
      WAFFLE_POSITIONS.filter(([r])   => r === 0),
      WAFFLE_POSITIONS.filter(([r])   => r === 2),
      WAFFLE_POSITIONS.filter(([r])   => r === 4),
      WAFFLE_POSITIONS.filter(([, c]) => c === 0),
      WAFFLE_POSITIONS.filter(([, c]) => c === 2),
      WAFFLE_POSITIONS.filter(([, c]) => c === 4),
    ];

    const priority = {green: 3, yellow: 2, gray: 1};

    for (const positions of wordGroups) {
      const solutionCounts = {};
      for (const [r, c] of positions) {
        const l = solution[r][c];
        solutionCounts[l] = (solutionCounts[l] || 0) + 1;
      }

      const remaining = {...solutionCounts};
      const wc = {};
      for (const [r, c] of positions) {
        if (grid[r][c] === solution[r][c]) {
          wc[`${r},${c}`] = 'green';
          remaining[solution[r][c]]--;
        }
      }

      for (const [r, c] of positions) {
        if (wc[`${r},${c}`] === 'green') continue;
        const letter = grid[r][c];
        if ((remaining[letter] || 0) > 0) {
          wc[`${r},${c}`] = 'yellow';
          remaining[letter]--;
        } else {
          wc[`${r},${c}`] = 'gray';
        }
      }

      for (const [r, c] of positions) {
        const existing = colors[r][c];
        if (existing === null || priority[wc[`${r},${c}`]] > priority[existing]) {
          colors[r][c] = wc[`${r},${c}`];
        }
      }
    }

    return colors;
  }

  // ══════════════════════════════════════════════════════════════
  //  RENDEREN
  // ══════════════════════════════════════════════════════════════
  function render() {
    const gridEl = document.getElementById('grid');
    gridEl.innerHTML = '';
    const colors = computeColors(currentGrid, currentSolution);

    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const letter = currentGrid[r][c];
        const cell = document.createElement('div');
        cell.classList.add('cell');

        if (letter === null) {
          cell.classList.add('empty');
        } else {
          cell.classList.add(colors[r][c]);
          cell.textContent = letter;
          cell.dataset.r = r;
          cell.dataset.c = c;

          if (!gameOver) {
            cell.draggable = true;
            cell.addEventListener('dragstart', onDragStart);
            cell.addEventListener('dragend',   onDragEnd);
            cell.addEventListener('dragover',   onDragOver);
            cell.addEventListener('dragleave',  onDragLeave);
            cell.addEventListener('drop',       onDrop);

            cell.addEventListener('touchstart', onTouchStart, {passive: false});
            cell.addEventListener('touchmove',  onTouchMove,  {passive: false});
            cell.addEventListener('touchend',   onTouchEnd,   {passive: false});
          }
        }

        gridEl.appendChild(cell);
      }
    }

    document.getElementById('swaps-left').textContent = swapsLeft;
    document.getElementById('puzzle-subtitle').textContent = 'Spel #' + gameNumber;
  }

  // ══════════════════════════════════════════════════════════════
  //  MUIS DRAG & DROP
  // ══════════════════════════════════════════════════════════════
  let dragSource = null;

  function onDragStart(e) {
    dragSource = {r: +this.dataset.r, c: +this.dataset.c};
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }
  function onDragEnd() {
    this.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    this.classList.add('drag-over');
  }
  function onDragLeave() {
    this.classList.remove('drag-over');
  }
  function onDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    if (!dragSource) return;
    performSwap(dragSource.r, dragSource.c, +this.dataset.r, +this.dataset.c);
    dragSource = null;
  }

  // ══════════════════════════════════════════════════════════════
  //  TOUCH DRAG
  // ══════════════════════════════════════════════════════════════
  let touchSrc = null;
  let touchTgt = null;

  function onTouchStart(e) {
    e.preventDefault();
    touchSrc = this;
    touchTgt = null;
    this.classList.add('dragging');
  }

  function onTouchMove(e) {
    e.preventDefault();
    const touch = e.touches[0];
    touchSrc.style.pointerEvents = 'none';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    touchSrc.style.pointerEvents = '';

    if (touchTgt && touchTgt !== el) touchTgt.classList.remove('drag-over');

    if (el && el.classList.contains('cell') && !el.classList.contains('empty') && el !== touchSrc) {
      el.classList.add('drag-over');
      touchTgt = el;
    } else {
      touchTgt = null;
    }
  }

  function onTouchEnd(e) {
    e.preventDefault();
    touchSrc.classList.remove('dragging');
    if (touchTgt) {
      touchTgt.classList.remove('drag-over');
      performSwap(
        +touchSrc.dataset.r, +touchSrc.dataset.c,
        +touchTgt.dataset.r, +touchTgt.dataset.c
      );
    }
    touchSrc = null;
    touchTgt = null;
  }

  // ══════════════════════════════════════════════════════════════
  //  WISSEL-LOGICA
  // ══════════════════════════════════════════════════════════════
  function performSwap(r1, c1, r2, c2) {
    if (r1 === r2 && c1 === c2) return;
    [currentGrid[r1][c1], currentGrid[r2][c2]] =
      [currentGrid[r2][c2], currentGrid[r1][c1]];
    swapsLeft--;
    render();
    checkWin();
  }

  function checkWin() {
    const msgEl = document.getElementById('message');
    if (isSolved(currentGrid, currentSolution)) {
      gameOver = true;
      msgEl.textContent = '🎉 Geweldig! Je hebt het opgelost!';
      render();
    } else if (swapsLeft <= 0) {
      gameOver = true;
      msgEl.textContent = '😢 Geen wissels meer. Probeer opnieuw!';
      render();
    } else {
      msgEl.textContent = '';
    }
  }

  // ══════════════════════════════════════════════════════════════
  //  SPELBESTURING
  // ══════════════════════════════════════════════════════════════
  function restartGame() {
    swapsLeft = DIFFICULTY_CONFIG[currentDifficulty].maxSwaps;
    gameOver = false;
    currentGrid = makePuzzleGrid(currentSolution, currentDifficulty);
    document.getElementById('message').textContent = '';
    render();
    updateDiffButtons();
  }

  function newGame() {
    gameNumber++;
    currentSolution = generatePuzzle();
    restartGame();
  }

  function setDifficulty(d) {
    currentDifficulty = d;
    restartGame();
  }

  function updateDiffButtons() {
    ['makkelijk','normaal','moeilijk'].forEach(d => {
      const id = {makkelijk:'diff-easy', normaal:'diff-normal', moeilijk:'diff-hard'}[d];
      document.getElementById(id).classList.toggle('active', d === currentDifficulty);
    });
  }

  // ── Start ──
  newGame();
  </script>
</body>
</html>
