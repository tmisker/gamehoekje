<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f12">
  <title>Boerenbridge – Score bijhouden</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0f0f12;--card:#1b1b20;--card2:#232329;--line:#2e2e36;
      --text:#f4f4f6;--muted:#9a9aa3;--accent:#4caf50;--accent-dim:rgba(76,175,80,.15);
      --red:#e53935;--red-dim:rgba(229,57,53,.12);--gold:#ffd600;
    }
    html{height:100%}
    body{
      min-height:100%;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
      display:flex;flex-direction:column;align-items:center;padding:16px 10px 60px;
    }
    a.backlink{
      align-self:flex-start;color:var(--muted);text-decoration:none;font-size:.9rem;
      margin-bottom:12px;
    }
    a.backlink:hover{color:var(--accent)}
    h1{font-size:1.5rem;margin-bottom:4px;text-align:center}
    .sub{color:var(--muted);font-size:.85rem;margin-bottom:16px;text-align:center}

    /* Start / setup */
    #start{max-width:400px;width:100%;display:flex;flex-direction:column;gap:14px}
    .panel{
      background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;
    }
    .panel h2{font-size:1rem;margin-bottom:12px}
    .panel label{display:block;margin-bottom:6px;font-weight:600;font-size:.95rem}
    .panel input,.panel select{
      width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;
      background:var(--card2);color:var(--text);font-size:1rem;margin-bottom:14px;
    }
    .player-inputs{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
    .player-inputs input{margin-bottom:0}
    button{
      padding:10px 20px;border:none;border-radius:10px;font-size:1rem;font-weight:700;
      cursor:pointer;transition:background .15s,transform .1s;color:#fff;
    }
    button:active{transform:scale(.96)}
    button:disabled{opacity:.5;cursor:default}
    .btn-primary{background:var(--accent);width:100%}
    .btn-primary:hover{background:#43a047}
    .btn-small{padding:7px 14px;font-size:.85rem;border-radius:8px;background:#3a3a3c}
    .btn-small:hover{background:#555}
    .btn-danger{background:var(--red)}
    .btn-danger:hover{background:#c62828}

    .resume-item{
      display:flex;flex-direction:column;gap:2px;width:100%;text-align:left;
      background:var(--card2);border:1px solid var(--line);border-radius:10px;
      padding:12px;margin-bottom:8px;font-weight:400;
    }
    .resume-item:hover{border-color:var(--accent)}
    .resume-item .who{font-weight:700}
    .resume-item .meta{color:var(--muted);font-size:.82rem}
    .display-link{display:block;text-align:center;color:var(--muted);font-size:.9rem;text-decoration:none;padding:6px}
    .display-link:hover{color:var(--accent)}
    details.lb summary{cursor:pointer;font-weight:700;font-size:1rem;list-style:none}
    details.lb summary::-webkit-details-marker{display:none}
    details.lb summary::after{content:' ▸';color:var(--muted)}
    details.lb[open] summary::after{content:' ▾'}
    details.lb table{margin-top:10px}

    /* Game */
    #game{width:100%;max-width:600px;display:none;flex-direction:column;gap:14px}
    .round-header{
      text-align:center;background:var(--card);border:1px solid var(--line);
      border-radius:12px;padding:14px;
    }
    .round-header .suit{font-size:2rem}
    .round-header .info{font-size:1.1rem;font-weight:700;margin-top:4px}
    .round-header .step{color:var(--muted);font-size:.85rem;margin-top:2px}
    .round-header .dealer{color:var(--gold);font-size:.9rem;margin-top:6px;font-weight:600}

    /* Input grid */
    .input-section{
      background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;
    }
    .input-section h3{font-size:.95rem;margin-bottom:10px;color:var(--muted)}
    .input-row{
      display:flex;align-items:center;gap:10px;margin-bottom:8px;
    }
    .input-row .pname{flex:1;font-weight:600;font-size:.95rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .input-row .dealer-badge{font-size:.75rem;color:var(--gold);margin-left:4px;font-weight:400}
    .input-row input{
      width:60px;padding:8px;border:1px solid var(--line);border-radius:8px;
      background:var(--card2);color:var(--text);font-size:1rem;text-align:center;
    }
    .input-row .predicted{
      color:var(--muted);font-size:.85rem;min-width:40px;text-align:center;
    }
    .warn{color:var(--gold);font-size:.82rem;text-align:center;margin-top:4px}
    .error{color:var(--red);font-size:.82rem;text-align:center;margin-top:4px}
    .conn-banner{
      display:none;background:var(--red-dim);border:1px solid var(--red);border-radius:10px;
      padding:10px;text-align:center;font-size:.9rem;
    }
    .conn-banner button{margin-top:8px}

    .btn-row{display:flex;gap:8px;justify-content:center;margin-top:6px}

    /* Scoreboard */
    .scoreboard{
      background:var(--card);border:1px solid var(--line);border-radius:12px;
      padding:14px;overflow-x:auto;
    }
    table{width:100%;border-collapse:collapse;font-size:.85rem;white-space:nowrap}
    th,td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--line)}
    th{color:var(--muted);font-weight:600;position:sticky;top:0;background:var(--card)}
    th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--card);z-index:1}
    td.pos{color:var(--accent);font-weight:700}
    td.neg{color:var(--red)}
    tr.current-round{background:var(--accent-dim)}
    tfoot td{font-weight:700;font-size:.95rem;border-top:2px solid var(--line)}

    /* Finished */
    .winner-banner{
      text-align:center;padding:20px;background:var(--card);border:2px solid var(--gold);
      border-radius:14px;
    }
    .winner-banner .trophy{font-size:3rem}
    .winner-banner .name{font-size:1.4rem;font-weight:800;color:var(--gold);margin-top:6px}
    .winner-banner .score{color:var(--muted);margin-top:4px}

    @media(max-width:400px){
      .input-row input{width:50px;padding:6px}
      table{font-size:.78rem}
      th,td{padding:4px 5px}
    }
  </style>
</head>
<body>
  <a class="backlink" href="../../index.html">← Alle spellen</a>
  <h1>🃏 Boerenbridge</h1>
  <p class="sub">Score bijhouden</p>

  <!-- START -->
  <div id="start">
    <div class="conn-banner" id="startConn">
      Geen verbinding met de server
      <button class="btn-small" id="startRetry">Opnieuw proberen</button>
    </div>
    <div class="panel" id="resumePanel" style="display:none">
      <h2>Verder spelen</h2>
      <div id="resumeList"></div>
    </div>
    <div class="panel">
      <h2>Nieuw spel</h2>
      <label>Aantal spelers</label>
      <select id="playerCount">
        <option value="3">3 spelers</option>
        <option value="4" selected>4 spelers</option>
        <option value="5">5 spelers</option>
        <option value="6">6 spelers</option>
      </select>
      <label>Namen</label>
      <div class="player-inputs" id="nameInputs"></div>
      <datalist id="knownNames"></datalist>
      <div id="startWarn"></div>
      <button class="btn-primary" id="startBtn">Starten</button>
    </div>
    <div class="panel">
      <details class="lb" id="lbDetails">
        <summary>🏆 Klassement</summary>
        <div id="lbArea" style="overflow-x:auto"></div>
      </details>
    </div>
    <a class="display-link" href="display/">📺 Scherm-weergave openen</a>
  </div>

  <!-- GAME -->
  <div id="game">
    <div class="round-header" id="roundHeader">
      <div class="suit" id="roundSuit"></div>
      <div class="info" id="roundInfo"></div>
      <div class="step" id="roundStep"></div>
      <div class="dealer" id="roundDealer"></div>
    </div>

    <div class="conn-banner" id="gameConn">
      Geen verbinding met de server
      <button class="btn-small" id="gameRetry">Opnieuw proberen</button>
    </div>

    <div class="input-section" id="inputSection"></div>

    <div class="scoreboard">
      <table id="scoreTable">
        <thead id="scoreHead"></thead>
        <tbody id="scoreBody"></tbody>
        <tfoot id="scoreFoot"></tfoot>
      </table>
    </div>

    <div id="winnerArea"></div>

    <div class="btn-row">
      <button class="btn-small" id="backToStartBtn">↩ Naar overzicht</button>
      <button class="btn-small btn-danger" id="abandonBtn">Spel afbreken</button>
    </div>
  </div>

<script>
(function(){
  const API = '../../api/boerenbridge';
  let game = null; // verrijkt serverobject; de server is autoritatief
  let lastFailed = null; // {run} — laatst mislukte actie, voor "Opnieuw proberen"

  const $=s=>document.querySelector(s);

  // ---- API-helper ----
  async function api(method, path, body){
    const res = await fetch(API + path, {
      method,
      headers: body ? {'Content-Type':'application/json'} : {},
      body: body ? JSON.stringify(body) : undefined,
    });
    let data = null;
    try{ data = await res.json(); }catch(e){}
    if(!res.ok){
      const err = new Error((data && data.error) || 'Serverfout');
      err.status = res.status;
      throw err;
    }
    return data;
  }

  // Voert een actie uit; bij netwerk/serverfout → banner + retry, bij 409 → refetch.
  async function attempt(run, connBannerId){
    lastFailed = null;
    $('#startConn').style.display='none';
    $('#gameConn').style.display='none';
    try{
      await run();
    }catch(err){
      if(err.status === 409 && game){
        game = await api('GET','/games/'+game.id).catch(()=>null);
        if(game) renderGame('Spel is elders bijgewerkt');
        else showStart();
        return;
      }
      if(err.status === 404 && game){ game=null; showStart(); return; }
      if(err.status && err.status < 500){
        // validatiefout: toon in het formulier
        const warn = $('#predWarn') || $('#actWarn') || $('#startWarn');
        if(warn) warn.innerHTML = '<span class="error">'+esc(err.message)+'</span>';
        return;
      }
      lastFailed = run;
      $(connBannerId).style.display='block';
    }
  }
  $('#startRetry').addEventListener('click',()=>{ if(lastFailed) attempt(lastFailed,'#startConn'); });
  $('#gameRetry').addEventListener('click',()=>{ if(lastFailed) attempt(lastFailed,'#gameConn'); });

  // ---- startscherm ----
  const countSel=$('#playerCount'), nameDiv=$('#nameInputs');
  function updateNameInputs(){
    const n=+countSel.value;
    nameDiv.innerHTML='';
    for(let i=0;i<n;i++){
      const inp=document.createElement('input');
      inp.placeholder='Speler '+(i+1);
      inp.setAttribute('list','knownNames');
      inp.dataset.idx=i;
      nameDiv.appendChild(inp);
    }
  }
  countSel.addEventListener('change',updateNameInputs);
  updateNameInputs();

  function showStart(){
    game=null;
    $('#game').style.display='none';
    $('#start').style.display='flex';
    $('#startWarn').innerHTML='';
    attempt(loadStartData,'#startConn');
  }

  async function loadStartData(){
    const [list, lb] = await Promise.all([
      api('GET','/games?status=active'),
      api('GET','/leaderboard'),
    ]);
    // hervat-lijst
    const panel=$('#resumePanel'), listDiv=$('#resumeList');
    listDiv.innerHTML='';
    panel.style.display = list.games.length ? '' : 'none';
    list.games.forEach(g=>{
      const btn=document.createElement('button');
      btn.className='resume-item';
      const date=new Date(g.createdAt).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
      btn.innerHTML='<span class="who">'+g.players.map(esc).join(', ')+'</span>'
        +'<span class="meta">Ronde '+(Math.min(g.currentRound,g.totalRounds-1)+1)+' van '+g.totalRounds+' · '+date+'</span>';
      btn.addEventListener('click',()=>attempt(async()=>{
        game = await api('GET','/games/'+g.id);
        renderGame();
      },'#startConn'));
      listDiv.appendChild(btn);
    });
    // bekende namen + klassement
    const dl=$('#knownNames');
    dl.innerHTML='';
    lb.leaderboard.forEach(e=>{
      const opt=document.createElement('option');
      opt.value=e.name;
      dl.appendChild(opt);
    });
    renderLeaderboard(lb.leaderboard);
  }

  function renderLeaderboard(rows){
    const area=$('#lbArea');
    if(!rows.length){
      area.innerHTML='<p class="sub" style="margin:10px 0 0">Nog geen afgeronde spellen.</p>';
      return;
    }
    let html='<table><thead><tr><th>Speler</th><th>Potjes</th><th>Gewonnen</th><th>Gem.</th><th>Beste</th></tr></thead><tbody>';
    rows.forEach(e=>{
      html+='<tr><td>'+esc(e.name)+'</td><td>'+e.gamesPlayed+'</td><td>'+e.wins+'</td><td>'+e.avgPoints+'</td><td>'+e.bestScore+'</td></tr>';
    });
    area.innerHTML=html+'</tbody></table>';
  }

  $('#startBtn').addEventListener('click',()=>{
    const names=[...nameDiv.querySelectorAll('input')].map((inp,i)=>inp.value.trim()||('Speler '+(i+1)));
    attempt(async()=>{
      game = await api('POST','/games',{players:names});
      renderGame();
    },'#startConn');
  });

  // ---- spelscherm ----
  function renderGame(notice){
    $('#start').style.display='none';
    $('#game').style.display='flex';
    $('#gameConn').style.display='none';
    renderScoreTable();
    if(game.status!=='active'){
      $('#roundSuit').textContent='';
      $('#roundInfo').textContent = game.status==='finished' ? '' : 'Spel afgebroken';
      $('#roundStep').textContent = game.status==='finished' ? 'Spel afgelopen!' : '';
      $('#roundDealer').textContent='';
      $('#inputSection').style.display='none';
      if(game.status==='finished') showWinner(); else $('#winnerArea').innerHTML='';
      return;
    }
    $('#winnerArea').innerHTML='';
    $('#inputSection').style.display='';
    const ri=game.roundInfo;
    $('#roundSuit').textContent=ri.suit;
    $('#roundSuit').style.color=ri.suitColor;
    $('#roundInfo').textContent=ri.suitName+' '+ri.cards;
    $('#roundStep').textContent='Ronde '+(game.currentRound+1)+' van '+game.rounds.length;
    $('#roundDealer').textContent='Deler: '+game.players[game.dealerIdx];
    if(game.phase==='predict') showPredictForm(notice);
    else showActualForm(notice);
  }

  function inputRows(withPredicted){
    const preds=game.predictions[game.currentRound];
    let html='';
    game.playerOrder.forEach(pi=>{
      const badge=pi===game.dealerIdx?' <span class="dealer-badge">(deler)</span>':'';
      html+='<div class="input-row"><span class="pname">'+esc(game.players[pi])+badge+'</span>'
        +(withPredicted?'<span class="predicted">voorspeld: '+preds[pi]+'</span>':'')
        +'<input type="number" min="0" max="'+game.roundInfo.cards+'" data-pi="'+pi+'" inputmode="numeric"></div>';
    });
    return html;
  }

  function wireEnterChain(sec, okId){
    const first=sec.querySelector('input');
    if(first) first.focus();
    sec.querySelectorAll('input').forEach((inp,i,all)=>{
      inp.addEventListener('keydown',e=>{
        if(e.key==='Enter'){
          e.preventDefault();
          if(i<all.length-1) all[i+1].focus();
          else document.getElementById(okId).click();
        }
      });
    });
  }

  function collectValues(sec, max, warnId){
    const vals=new Array(game.players.length);
    let valid=true;
    sec.querySelectorAll('input[data-pi]').forEach(inp=>{
      const pi=+inp.dataset.pi, v=inp.value;
      if(v===''||isNaN(+v)||+v<0||+v>max){valid=false;}
      vals[pi]=+v;
    });
    if(!valid){
      document.getElementById(warnId).innerHTML='<span class="error">Vul geldige aantallen in (0–'+max+')</span>';
      return null;
    }
    return vals;
  }

  function showPredictForm(notice){
    const cards=game.roundInfo.cards;
    const sec=$('#inputSection');
    sec.innerHTML='<h3>Hoeveel slagen raad je? (max '+cards+')</h3>'
      +inputRows(false)
      +'<div id="predWarn">'+(notice?'<span class="warn">'+esc(notice)+'</span>':'')+'</div>'
      +'<div class="btn-row">'
      +(game.currentRound>0?'<button class="btn-small" id="predUndo">← Terug</button>':'')
      +'<button class="btn-primary" style="flex:1" id="predOk">Slagen invoeren →</button></div>';
    wireEnterChain(sec,'predOk');

    const undoBtn=document.getElementById('predUndo');
    if(undoBtn) undoBtn.addEventListener('click',()=>attempt(async()=>{
      game = await api('POST','/games/'+game.id+'/undo');
      renderGame();
    },'#gameConn'));

    document.getElementById('predOk').addEventListener('click',()=>{
      const preds=collectValues(sec,cards,'predWarn');
      if(!preds) return;
      const total=preds.reduce((a,b)=>a+b,0);
      // advieswaarschuwing blijft client-side; blokkeert niet
      if(total===cards){
        const w=document.getElementById('predWarn');
        if(!w.dataset.warned){
          w.dataset.warned='1';
          w.innerHTML='<span class="warn">⚠ Totaal voorspeld ('+total+') is gelijk aan het aantal kaarten ('+cards+') — druk nogmaals om door te gaan</span>';
          return;
        }
      }
      const btn=document.getElementById('predOk');
      btn.disabled=true;
      attempt(async()=>{
        game = await api('POST','/games/'+game.id+'/predictions',{round:game.currentRound,predictions:preds});
        renderGame();
      },'#gameConn').finally(()=>{ btn.disabled=false; });
    });
  }

  function showActualForm(notice){
    const cards=game.roundInfo.cards;
    const sec=$('#inputSection');
    sec.innerHTML='<h3>Werkelijke slagen</h3>'
      +inputRows(true)
      +'<div id="actWarn">'+(notice?'<span class="warn">'+esc(notice)+'</span>':'')+'</div>'
      +'<div class="btn-row">'
      +'<button class="btn-small" id="actBack">← Terug</button>'
      +'<button class="btn-primary" style="flex:1" id="actOk">Bevestigen ✓</button></div>';
    wireEnterChain(sec,'actOk');

    document.getElementById('actBack').addEventListener('click',()=>attempt(async()=>{
      game = await api('POST','/games/'+game.id+'/undo');
      renderGame();
    },'#gameConn'));

    document.getElementById('actOk').addEventListener('click',()=>{
      const acts=collectValues(sec,cards,'actWarn');
      if(!acts) return;
      const total=acts.reduce((a,b)=>a+b,0);
      if(total!==cards){
        document.getElementById('actWarn').innerHTML='<span class="error">Totaal slagen ('+total+') is niet gelijk aan kaarten ('+cards+')</span>';
        return;
      }
      const btn=document.getElementById('actOk');
      btn.disabled=true;
      attempt(async()=>{
        game = await api('POST','/games/'+game.id+'/actuals',{round:game.currentRound,actuals:acts});
        renderGame();
      },'#gameConn').finally(()=>{ btn.disabled=false; });
    });
  }

  function renderScoreTable(){
    let headHtml='<tr><th>Ronde</th>';
    game.players.forEach(p=>{headHtml+='<th>'+esc(p)+'</th>';});
    $('#scoreHead').innerHTML=headHtml+'</tr>';

    let bodyHtml='';
    const played=game.roundScores.length;
    for(let r=0;r<played;r++){
      const rd=game.rounds[r];
      const cls=r===played-1?' class="current-round"':'';
      bodyHtml+='<tr'+cls+'><td>'+SUITS_LOCAL[rd.suitIdx]+' '+rd.cards+'</td>';
      game.roundScores[r].forEach(s=>{
        const c=s>0?'pos':s<0?'neg':'';
        bodyHtml+='<td class="'+c+'">'+(s>0?'+':'')+s+'</td>';
      });
      bodyHtml+='</tr>';
    }
    $('#scoreBody').innerHTML=bodyHtml;

    let footHtml='<tr><td>Totaal</td>';
    game.totals.forEach(t=>{footHtml+='<td>'+t+'</td>';});
    $('#scoreFoot').innerHTML=footHtml+'</tr>';
  }
  const SUITS_LOCAL=['♣','♥','♦','♠','Sans'];

  function showWinner(){
    const names=game.winnerIdxs.map(i=>esc(game.players[i])).join(' & ');
    const max=Math.max(...game.totals);
    $('#winnerArea').innerHTML='<div class="winner-banner">'
      +'<div class="trophy">🏆</div>'
      +'<div class="name">'+names+(game.winnerIdxs.length>1?' winnen!':' wint!')+'</div>'
      +'<div class="score">'+max+' punten</div></div>';
  }

  // ---- knoppen onder het spel ----
  $('#backToStartBtn').addEventListener('click',showStart);
  $('#abandonBtn').addEventListener('click',()=>{
    if(game && game.status!=='active'){ showStart(); return; }
    if(!confirm('Dit spel afbreken? Het telt dan niet mee voor het klassement.')) return;
    attempt(async()=>{
      await api('POST','/games/'+game.id+'/abandon');
      showStart();
    },'#gameConn');
  });

  // Telefoon uit slaapstand: state kan verouderd zijn → refetch.
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState!=='visible') return;
    if(game) attempt(async()=>{
      game = await api('GET','/games/'+game.id);
      renderGame();
    },'#gameConn');
    else showStart();
  });

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  showStart();
})();
</script>
</body>
</html>
