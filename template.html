<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121213">
  <title>Kubus Solver</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#121213; --panel:#1e1e20; --panel2:#2a2a2d; --line:#3a3a3c;
      --accent:#1faa47; --accentd:#178a3a; --text:#fff; --muted:#9a9a9d;
    }
    html,body{height:100%;}
    body{
      background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
      display:flex; flex-direction:column; align-items:center;
      min-height:100%; padding:14px 12px 32px; gap:12px;
    }
    header{text-align:center;}
    header h1{font-size:1.5rem;letter-spacing:1px;}
    header p{color:var(--muted);font-size:.78rem;margin-top:3px;}

    .card{
      width:100%; max-width:460px; background:var(--panel);
      border:1px solid var(--line); border-radius:14px; padding:12px;
    }

    /* ── net ── */
    #net{
      display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(3,auto);
      gap:6px; width:100%; max-width:460px; margin:0 auto;
    }
    .face{display:flex;flex-direction:column;gap:3px;}
    .facelabel{font-size:.6rem;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:1px;height:.8em;}
    .facegrid{
      display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
      gap:3px;aspect-ratio:1/1;background:#0c0c0d;padding:3px;border-radius:6px;
    }
    .sticker{
      border-radius:4px; aspect-ratio:1/1; cursor:pointer;
      border:1px solid rgba(0,0,0,.35); transition:transform .08s;
    }
    .sticker:active{transform:scale(.9);}
    .sticker.center{cursor:default;box-shadow:inset 0 0 0 2px rgba(0,0,0,.25);}
    .face.turning .facegrid{outline:3px solid var(--accent);outline-offset:1px;box-shadow:0 0 14px var(--accent);}
    .face.turning .facelabel{color:var(--accent);}

    /* ── palette ── */
    #paletteWrap{text-align:center;}
    .hint{font-size:.74rem;color:var(--muted);margin-bottom:8px;}
    #palette{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .swatch{
      width:40px;height:40px;border-radius:9px;border:2px solid #000;cursor:pointer;
      transition:transform .1s, box-shadow .1s;
    }
    .swatch.sel{transform:scale(1.12);box-shadow:0 0 0 3px var(--text);}

    /* ── buttons ── */
    .btnrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
    button{
      font-family:inherit;font-weight:600;font-size:.9rem;border:none;border-radius:10px;
      padding:11px 14px;color:#fff;background:var(--panel2);cursor:pointer;
      transition:transform .08s,background .15s;
    }
    button:active{transform:translateY(1px);}
    .primary{background:var(--accent);}
    .primary:active{background:var(--accentd);}
    .grow{flex:1;min-width:120px;}

    #status{min-height:1.2em;font-size:.85rem;text-align:center;color:var(--muted);padding:0 4px;}
    #status.warn{color:#ff7a7a;}

    /* ── solve panel ── */
    #solvePanel{display:none;width:100%;max-width:460px;}
    #moveinfo{
      display:flex;flex-direction:column;align-items:center;gap:2px;
      padding:10px;margin-bottom:10px;text-align:center;
    }
    .bignote{font-size:2.4rem;font-weight:800;line-height:1;color:var(--accent);}
    .bigtext{font-size:.95rem;}
    .counter{font-size:.75rem;color:var(--muted);margin-top:2px;}
    #movelist{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:12px;max-height:120px;overflow:auto;}
    .movechip{
      font-family:'SFMono-Regular',Menlo,Consolas,monospace;font-weight:700;font-size:.8rem;
      background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:5px 8px;cursor:pointer;
    }
    .movechip.done{opacity:.4;}
    .movechip.current{background:var(--accent);border-color:var(--accent);transform:scale(1.08);}
    .player{display:flex;gap:6px;justify-content:center;align-items:center;}
    .player button{padding:11px 12px;min-width:48px;font-size:1.05rem;}

    footer{font-size:.7rem;color:#55555a;text-align:center;margin-top:4px;}
  </style>
</head>
<body>
  <header>
    <h1>🧩 Kubus&nbsp;Solver</h1>
    <p>Kleur je kubus in en los hem stap voor stap op</p>
  </header>

  <div id="net"></div>

  <div id="status"></div>

  <div id="paletteWrap" class="card">
    <div class="hint">Kies een kleur en tik op de vlakjes. De middens staan vast.</div>
    <div id="palette"></div>
  </div>

  <div id="editControls" class="btnrow card">
    <button id="scrambleBtn" class="grow">🎲 Door elkaar</button>
    <button id="resetBtn" class="grow">↺ Leegmaken</button>
    <button id="solveBtn" class="primary grow">✨ Los op!</button>
  </div>

  <div id="solvePanel" class="card">
    <div id="moveinfo"></div>
    <div id="movelist"></div>
    <div class="player">
      <button id="firstBtn" title="Begin">⏮</button>
      <button id="prevBtn" title="Vorige">◀</button>
      <button id="playBtn" class="primary">▶ Speel af</button>
      <button id="nextBtn" title="Volgende">▶</button>
      <button id="lastBtn" title="Einde">⏭</button>
    </div>
    <div class="btnrow" style="margin-top:10px;">
      <button id="editBtn" class="grow">✎ Opnieuw invoeren</button>
    </div>
  </div>

  <footer>Werkt volledig offline · Efficiënte oplossing in ±20 zetten (two-phase)</footer>

  <script id="solver-src">/*__SOLVER__*/</script>
  <script id="kociemba-src">/*__KOCIEMBA__*/</script>
  <script>/*__APP__*/</script>
</body>
</html>
